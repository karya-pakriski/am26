<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesmen Diagnostik | SDN 1 Godegan</title>
    <style>
        :root {
            --primary: #4361ee; --primary-light: #4895ef; --primary-dark: #3f37c9;
            --sidebar-bg: #0f172a; --sidebar-text: #94a3b8; --sidebar-hover: #1e293b;
            --bg: #f8fafc; --surface: #ffffff;
            --text: #0f172a; --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --radius-md: 12px; --radius-lg: 20px; 
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }
        .hidden { display: none !important; }

        /* Badge */
        .badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; letter-spacing: 0.3px; }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-info { background: #e0e7ff; color: #3730a3; }
        .badge-neutral { background: #f1f5f9; color: #475569; }

        /* Toast */
        .toast-container { position: fixed; top: 24px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast { min-width: 320px; padding: 16px; border-radius: 12px; background: var(--surface); box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 14px; transform: translateX(120%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-left: 4px solid var(--primary); pointer-events: auto; }
        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: var(--danger); }
        .toast.success { border-left-color: var(--success); }
        .toast.warning { border-left-color: var(--warning); }
        .toast-icon { flex-shrink: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .toast.success .toast-icon { background: #d1fae5; color: var(--success); }
        .toast.error .toast-icon { background: #fee2e2; color: var(--danger); }
        .toast.warning .toast-icon { background: #fef3c7; color: var(--warning); }
        .toast-content { flex-grow: 1; font-size: 14px; font-weight: 500; }
        .toast-close { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 6px; transition: 0.2s; }
        .toast-close:hover { background: var(--bg); color: var(--text); }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.7); backdrop-filter: blur(4px); z-index: 9999; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.3s; }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-card { background: var(--surface); padding: 32px; border-radius: var(--radius-lg); width: 100%; max-width: 420px; box-shadow: var(--shadow-lg); transform: scale(0.95) translateY(20px); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-overlay.show .modal-card { transform: scale(1) translateY(0); }
        .modal-card h3 { font-size: 20px; margin-bottom: 12px; color: var(--text); }
        .modal-card p { font-size: 15px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
        .modal-actions button { margin-top: 0; width: auto; padding: 10px 20px; }

        /* Spinner */
        .btn-spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; flex-shrink: 0; }
        .inline-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; color: var(--text-muted); text-align: center; }
        .inline-loader .spinner-large { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Login */
        .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #e0e7ff 0%, #f8fafc 100%); padding: 20px; }
        .login-card { background: var(--surface); padding: 48px 40px; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); width: 100%; max-width: 440px; text-align: center; border: 1px solid rgba(255,255,255,0.8); }
        .login-icon { width: 88px; height: 88px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; color: white; transform: rotate(-5deg); box-shadow: 0 10px 20px rgba(67,97,238,0.2); }
        .login-icon svg { width: 44px; height: 44px; stroke: white; transform: rotate(5deg); }
        .login-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; color: var(--text); letter-spacing: -0.5px; }
        .login-sub { color: var(--text-muted); font-size: 15px; margin-bottom: 32px; }
        .input-group { text-align: left; margin-bottom: 24px; }
        .input-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
        input[type="text"], input[type="number"], textarea { width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: 10px; font-size: 15px; transition: all 0.2s ease; background: var(--bg); color: var(--text); }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; background: var(--surface); box-shadow: 0 0 0 4px rgba(67,97,238,0.1); }
        
        button { background: var(--primary); color: white; border: none; padding: 14px 24px; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s ease; width: 100%; }
        button:hover:not(:disabled) { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(67,97,238,0.2); }
        button:active:not(:disabled) { transform: translateY(0); }
        button.secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
        button.secondary:hover:not(:disabled) { background: #e2e8f0; border-color: #cbd5e1; box-shadow: none; }
        button:disabled { opacity: 0.7; cursor: not-allowed; }

        /* Dashboard Layout */
        .app-layout { display: flex; min-height: 100vh; background: var(--bg); }
        .sidebar { width: 280px; background: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 10; border-right: 1px solid #1e293b; }
        .sidebar-header { padding: 32px 24px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-header .avatar { width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 20px; flex-shrink: 0; box-shadow: 0 4px 10px rgba(67,97,238,0.3); }
        .sidebar-header .user-detail h4 { color: #f8fafc; font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .sidebar-header .user-detail p { font-size: 13px; color: #94a3b8; }

        .nav-menu { padding: 24px 16px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; color: var(--sidebar-text); cursor: pointer; transition: all 0.2s ease; border-radius: 10px; font-weight: 500; position: relative; }
        .nav-item:hover, .nav-item.active { background: var(--sidebar-hover); color: white; }
        .nav-item.active { background: rgba(67,97,238,0.15); color: var(--primary-light); }
        .nav-item.active svg { stroke: var(--primary-light); }
        .nav-item.locked { opacity: 0.5; cursor: not-allowed; }
        .nav-item.completed { color: #cbd5e1; }
        .nav-item svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: 0.2s; }

        .main-content { flex: 1; margin-left: 280px; padding: 40px 48px; overflow-y: auto; max-height: 100vh; }
        
        .card { background: var(--surface); padding: 32px; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); border: 1px solid var(--border); margin-bottom: 24px; transition: 0.2s ease; }
        .card:hover { box-shadow: var(--shadow-md); }
        
        .welcome-banner { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 40px; border-radius: var(--radius-lg); margin-bottom: 32px; box-shadow: 0 10px 25px rgba(67,97,238,0.25); position: relative; overflow: hidden; }
        .welcome-banner::after { content: ''; position: absolute; right: 0; top: 0; width: 40%; height: 100%; background: radial-gradient(circle at right, rgba(255,255,255,0.1) 0%, transparent 70%); pointer-events: none; }
        .welcome-banner h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
        .welcome-banner p { font-size: 16px; opacity: 0.9; }

        /* Grid Beranda 75% - 25% */
        .dashboard-grid { display: grid; grid-template-columns: 3fr 1fr; gap: 24px; align-items: start; }
        @media (max-width: 1024px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .sidebar { width: 240px; }
            .main-content { margin-left: 240px; padding: 24px; }
        }

        .table-responsive { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        th, td { padding: 16px 20px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #f8fafc; font-weight: 600; font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #f8fafc; }

        .question-block { background: var(--surface); padding: 28px; border-radius: var(--radius-md); margin-bottom: 24px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
        .question-block p { color: var(--text); line-height: 1.6; }
        .option-label { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border: 2px solid var(--border); border-radius: 10px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s ease; background: var(--surface); }
        .option-label:hover { border-color: var(--primary-light); background: #f8fafc; }
        input[type="radio"], input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); }
        input[type="radio"]:checked + .option-text, input[type="checkbox"]:checked + .option-text { font-weight: 600; color: var(--primary-dark); }
        
        .koreksi-readonly { background: #f8fafc; padding: 16px; border-radius: 8px; margin-top: 12px; color: var(--text); border-left: 4px solid #cbd5e1; font-size: 14px; line-height: 1.5; }
        
        .result-grid { display: grid; grid-template-columns: auto 1fr; gap: 12px 16px; align-items: center; margin-top: 12px; }
        .result-label { font-weight: 600; color: var(--text-muted); white-space: nowrap; font-size: 14px; }
        .result-label::after { content: " :"; }
        .result-value { color: var(--text); font-size: 15px; font-weight: 500; }
        .result-value.pending { color: var(--warning); font-style: italic; font-weight: normal; }
        hr.divider { margin: 24px 0; border: none; border-top: 1px dashed var(--border); }
    </style>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    
    <div id="custom-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 id="modal-title">Konfirmasi</h3>
            <p id="modal-message">Apakah Anda yakin?</p>
            <div class="modal-actions">
                <button id="modal-btn-cancel" class="secondary">Batal</button>
                <button id="modal-btn-confirm">Yakin</button>
            </div>
        </div>
    </div>

    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <div class="login-icon">
                <svg viewBox="0 0 24 24" fill="none"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
            </div>
            <h1 class="login-title">SDN 1 Godegan</h1>
            <p class="login-sub">Asesmen Diagnostik Pembelajaran</p>
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>ID Pengguna</label>
                    <input type="text" id="input-id" placeholder="Cth: S101, G001, Admin" required autocomplete="off" autofocus>
                </div>
                <button type="submit" id="btn-login">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                    Masuk Portal
                </button>
            </form>
        </div>
    </div>

    <div id="dashboard" class="app-layout hidden">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="avatar" id="sidebar-avatar">SD</div>
                <div class="user-detail">
                    <h4 id="sidebar-name">Nama</h4>
                    <p id="sidebar-role">Peran</p>
                </div>
            </div>
            <nav class="nav-menu" id="nav-menu"></nav>
            <div style="padding: 24px 16px; margin-top: auto;">
                <button onclick="logout()" class="secondary" style="background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Keluar Sistem
                </button>
            </div>
        </aside>
        <main class="main-content" id="main-panel"></main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyiOvVCJ0m0Pey2RU-Gh7gbUMzNZE18OV3ETDuT8stVsU7xvNkGTVXHxeJwRrpK0J3n0Q/exec";
        
        const state = {
            user: null, modulAktif: null, soalAktif: [],
            antreanGuru: [], koreksiAktif: null, allowLihatHasil: false
        };

        const icons = {
            home: `<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
            book: `<svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`,
            clipboard: `<svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><line x1="9" y1="14" x2="15" y2="14"/><line x1="9" y1="18" x2="13" y2="18"/></svg>`,
            chart: `<svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
            lock: `<svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></svg>`,
            check: `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,
            play: `<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
            success: `<svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="3" fill="none"><polyline points="20 6 9 17 4 12"></polyline></svg>`,
            error: `<svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="3" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`,
            warning: `<svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="3" fill="none"><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`,
            info: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`
        };

        // ==================== UI HELPERS ====================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <div class="toast-icon">${icons[type] || icons.success}</div>
                <div class="toast-content">${message}</div>
                <button class="toast-close" onclick="this.parentElement.remove()">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        function showConfirm(title, message, onConfirm) {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            const btnConfirm = document.getElementById('modal-btn-confirm');
            const btnCancel = document.getElementById('modal-btn-cancel');
            
            const newConfirm = btnConfirm.cloneNode(true);
            const newCancel = btnCancel.cloneNode(true);
            btnConfirm.parentNode.replaceChild(newConfirm, btnConfirm);
            btnCancel.parentNode.replaceChild(newCancel, btnCancel);
            
            newCancel.onclick = () => modal.classList.remove('show');
            newConfirm.onclick = () => { modal.classList.remove('show'); onConfirm(); };
            modal.classList.add('show');
        }

        async function fetchAPI(payload, btnElement = null, targetPanel = null) {
            let originalBtnHtml = '';
            if (btnElement) {
                originalBtnHtml = btnElement.innerHTML;
                btnElement.innerHTML = `<span class="btn-spinner"></span> Memproses...`;
                btnElement.disabled = true;
            } else if (targetPanel) {
                targetPanel.innerHTML = `<div class="inline-loader"><div class="spinner-large"></div><p style="font-weight:500;">Menarik data dari server...</p></div>`;
            }

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.status === "error") throw new Error(data.message);
                return data.data || data.message;
            } catch (err) {
                showToast(err.message, 'error');
                if (targetPanel) targetPanel.innerHTML = `<div class="inline-loader" style="color:var(--danger)"><p>Gagal memuat data dari server.</p></div>`;
                return null;
            } finally {
                if (btnElement) {
                    btnElement.innerHTML = originalBtnHtml;
                    btnElement.disabled = false;
                }
            }
        }

        // ==================== CORE LOGIC ====================
        async function handleLogin(e) {
            e.preventDefault();
            const id = document.getElementById('input-id').value.trim();
            const btn = document.getElementById('btn-login');
            const user = await fetchAPI({ action: 'login', idPengguna: id }, btn);
            if (user) {
                sessionStorage.setItem('sessionUser', JSON.stringify(user));
                state.user = user;
                showToast('Autentikasi berhasil', 'success');
                initDashboard();
            }
        }

        function initDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('sidebar-name').innerText = state.user.nama;
            document.getElementById('sidebar-role').innerText = `${state.user.peran} • ${state.user.keterangan}`;
            document.getElementById('sidebar-avatar').innerText = state.user.nama.charAt(0).toUpperCase();
            
            if (localStorage.getItem(`allowHasil_${state.user.id}`) === 'true') state.allowLihatHasil = true;
            renderSidebar();
            navigasi('beranda');
        }

        function renderSidebar() {
            const peran = state.user.peran.toLowerCase();
            const nav = document.getElementById('nav-menu');
            nav.innerHTML = '';

            if (peran === 'siswa') {
                nav.innerHTML += navItem('beranda', icons.home, 'Beranda');
                const modulList = ['Literasi', 'Numerasi', 'Nonkognitif'];
                const progres = (state.user.progres || '').split(',').filter(Boolean);
                let unlockNext = true;

                modulList.forEach(mod => {
                    const done = progres.includes(mod);
                    const locked = !done && !unlockNext;
                    if (!done && unlockNext) unlockNext = false;
                    
                    let icon = icons.book, extraClass = '', clickHandler = '', label = `Modul ${mod}`;
                    if (done) { icon = icons.check; extraClass = 'completed'; label += ' ✓'; }
                    else if (locked) { icon = icons.lock; extraClass = 'locked'; }
                    else { icon = icons.play; clickHandler = `navigasi('ujian-${mod}', this)`; }
                    
                    nav.innerHTML += `<div class="nav-item ${extraClass}" data-panel="ujian-${mod}" onclick="${clickHandler}">${icon} ${label}</div>`;
                });

                const semuaSelesai = progres.length >= 3;
                nav.innerHTML += navItem('hasil', semuaSelesai ? icons.chart : icons.lock, 'Hasil Belajar', !semuaSelesai);

            } else {
                nav.innerHTML += navItem('beranda', icons.home, 'Beranda');
                nav.innerHTML += navItem('nilai-ujian', icons.clipboard, 'Koreksi Manual');
                
                const isAksesPenuh = (peran === 'admin') || state.allowLihatHasil;
                nav.innerHTML += navItem('lihat-hasil', isAksesPenuh ? icons.chart : icons.lock, 'Rekapitulasi Nilai', !isAksesPenuh);
            }
        }

        function navItem(panelId, iconHtml, label, locked = false) {
            return `<div class="nav-item ${locked ? 'locked' : ''}" data-panel="${panelId}" onclick="${locked ? '' : `navigasi('${panelId}', this)`}">${iconHtml} <span>${label}</span></div>`;
        }

        function navigasi(panelId, element = null) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if (element) element.classList.add('active');
            else {
                const target = document.querySelector(`.nav-item[data-panel="${panelId}"]`);
                if (target && !target.classList.contains('locked') && !target.classList.contains('completed')) target.classList.add('active');
            }

            const main = document.getElementById('main-panel');
            main.innerHTML = '';

            if (panelId.startsWith('ujian-')) { mulaiUjian(panelId.split('-')[1]); return; }
            switch (panelId) {
                case 'beranda': renderBeranda(); break;
                case 'hasil': renderHasilSiswa(); break;
                case 'nilai-ujian': renderNilaiUjian(); break;
                case 'lihat-hasil': renderLihatHasil(); break;
            }
        }

        function renderValue(value, fallback = 'Menunggu Penilaian') {
            return (value !== undefined && value !== null && value !== '' && value !== '-') ? value : `<span class="result-value pending">${fallback}</span>`;
        }

        // ==================== BERANDA LAYOUT ====================
        function renderBeranda() {
            const p = state.user.peran.toLowerCase();
            let html = `<div class="welcome-banner">
                <h2>Selamat Datang, ${state.user.nama}!</h2>
                <p>${p === 'siswa' ? 'Kelas ' + state.user.keterangan : p === 'guru' ? 'Wali Kelas ' + state.user.keterangan : 'Administrator • Akses Penuh'}</p>
            </div>`;

            html += `<div class="dashboard-grid">`;
            
            // Kolom Kiri (75%)
            if (p === 'siswa') {
                html += `
                <div class="card" style="border-top: 4px solid var(--primary);">
                    <div style="display:flex; align-items:center; gap:12px; margin-bottom:16px;">
                        <div style="width:40px; height:40px; border-radius:10px; background:var(--bg); display:flex; align-items:center; justify-content:center; color:var(--primary);">${icons.info}</div>
                        <h3 style="color:var(--text); font-size:20px;">Tujuan Asesmen Diagnostik</h3>
                    </div>
                    <p style="color:var(--text-muted); line-height:1.7; font-size:15px; margin-bottom:16px;">
                        Asesmen ini dirancang bukan untuk menentukan siapa yang paling pintar di kelas, melainkan untuk <strong>memahami keunikan cara belajarmu</strong>. Kami ingin memetakan kemampuan dasar literasi dan numerasimu saat ini.
                    </p>
                    <p style="color:var(--text-muted); line-height:1.7; font-size:15px;">
                        Selain itu, melalui modul nonkognitif, guru dapat mengetahui gaya belajar, minat, dan bakat terpendam yang kamu miliki. Kerjakanlah semua soal dengan santai dan jujur agar kami bisa merancang metode pembelajaran yang paling seru dan tepat untukmu!
                    </p>
                </div>`;
            } else {
                html += `
                <div class="card" style="border-top: 4px solid var(--primary);">
                    <div style="display:flex; align-items:center; gap:12px; margin-bottom:16px;">
                        <div style="width:40px; height:40px; border-radius:10px; background:var(--bg); display:flex; align-items:center; justify-content:center; color:var(--primary);">${icons.info}</div>
                        <h3 style="color:var(--text); font-size:20px;">Pemetaan Profil Siswa</h3>
                    </div>
                    <p style="color:var(--text-muted); line-height:1.7; font-size:15px; margin-bottom:16px;">
                        Sistem asesmen ini memfasilitasi sekolah untuk mendapatkan data empiris mengenai kondisi awal peserta didik. Pengukuran mencakup dua ranah utama: <strong>Kognitif</strong> (Literasi dan Numerasi standar AKM) serta <strong>Nonkognitif</strong> (Gaya belajar, minat, bakat, dan pembiasaan karakter).
                    </p>
                    <p style="color:var(--text-muted); line-height:1.7; font-size:15px;">
                        Gunakan data rekapitulasi yang dihasilkan oleh sistem ini sebagai landasan penyusunan strategi <em>Pembelajaran Berdiferensiasi</em> di dalam kelas. Pastikan Anda menyelesaikan koreksi jawaban uraian agar grafik capaian siswa terakumulasi secara utuh.
                    </p>
                </div>`;
            }

            // Kolom Kanan (25%)
            if (p === 'siswa') {
                html += `
                <div class="card" style="background: var(--bg); border:none;">
                    <h3 style="margin-bottom:20px; font-size:16px; color:var(--text);">Profil Kamu</h3>
                    <div style="display:flex; flex-direction:column; gap:16px;">
                        <div>
                            <div style="font-size:12px; color:var(--text-muted); font-weight:600; text-transform:uppercase; margin-bottom:4px;">Nama Lengkap</div>
                            <div style="font-weight:500; color:var(--text);">${state.user.nama}</div>
                        </div>
                        <div>
                            <div style="font-size:12px; color:var(--text-muted); font-weight:600; text-transform:uppercase; margin-bottom:4px;">Rombongan Belajar</div>
                            <div style="font-weight:500; color:var(--text);">${state.user.keterangan}</div>
                        </div>
                        <div>
                            <div style="font-size:12px; color:var(--text-muted); font-weight:600; text-transform:uppercase; margin-bottom:4px;">Status Misi</div>
                            <div style="font-weight:600; color:var(--primary);">${state.user.progres ? state.user.progres.split(',').length + ' Modul Selesai' : 'Belum Memulai'}</div>
                        </div>
                    </div>
                </div>`;
            } else {
                html += `
                <div class="card" style="background: var(--bg); border:none;">
                    <h3 style="margin-bottom:20px; font-size:16px; color:var(--text);">Jalan Pintas</h3>
                    <div style="display:flex; flex-direction:column; gap:12px;">
                        <button class="secondary" style="justify-content:flex-start; background:var(--surface);" onclick="navigasi('nilai-ujian')">${icons.clipboard} Buka Antrean Koreksi</button>
                        <button class="secondary" style="justify-content:flex-start; background:var(--surface);" onclick="${state.allowLihatHasil || p === 'admin' ? `navigasi('lihat-hasil')` : `showToast('Selesaikan koreksi terlebih dahulu.', 'warning')`}">${icons.chart} Lihat Rapor Kelas</button>
                    </div>
                </div>`;
            }
            
            html += `</div>`; // Tutup grid layout
            document.getElementById('main-panel').innerHTML = html;
        }

        // ==================== SISWA: UJIAN & HASIL ====================
        async function mulaiUjian(modul) {
            const main = document.getElementById('main-panel');
            const soal = await fetchAPI({ action: 'getSoal', idPengguna: state.user.id, kelas: state.user.keterangan, modul }, null, main);
            if (!soal || soal.length === 0) { showToast('Soal belum didistribusikan.', 'warning'); navigasi('beranda'); return; }
            state.modulAktif = modul; state.soalAktif = soal;
            renderFormUjian();
        }

        function renderFormUjian() {
            const main = document.getElementById('main-panel');
            let html = `<h2 style="margin-bottom:24px;">Asesmen ${state.modulAktif}</h2><form id="form-ujian">`;
            state.soalAktif.forEach((q, i) => {
                html += `<div class="question-block"><p style="font-weight:600; margin-bottom:12px; font-size:16px;">${i+1}. ${q.pertanyaan}</p>`;
                if (q.bacaan) html += `<p style="font-style:italic; background:var(--bg); padding:16px; border-radius:8px; margin-bottom:16px; color:var(--text); line-height:1.6; border-left:4px solid var(--primary-light);">${q.bacaan}</p>`;
                if (q.gambar) html += `<img src="${q.gambar}" style="max-width:100%; margin-bottom:16px; border-radius:12px; box-shadow:var(--shadow-sm);">`;

                if (q.tipe === 'PG' || q.tipe === 'BS') q.opsi.forEach(opt => html += `<label class="option-label"><input type="radio" name="s_${i}" value="${opt}" required> <span class="option-text">${opt}</span></label>`);
                else if (q.tipe === 'PGK') {
                    html += `<p style="font-size:13px; color:var(--text-muted); margin-bottom:12px; font-weight:500;">Pilih jawaban yang benar (bisa lebih dari satu)</p>`;
                    q.opsi.forEach(opt => html += `<label class="option-label"><input type="checkbox" name="s_${i}" value="${opt}"> <span class="option-text">${opt}</span></label>`);
                } else html += `<textarea name="s_${i}" rows="4" required placeholder="Tuliskan jawaban lengkapmu di sini..."></textarea>`;
                html += `</div>`;
            });
            html += `<div style="display:flex; gap:12px; margin-top:32px;">
                        <button type="button" id="btn-submit-ujian" onclick="validasiKirimUjian()" style="width:auto;">Kirim Jawaban Akhir</button>
                        <button type="button" class="secondary" style="width:auto;" onclick="showConfirm('Batalkan Ujian?', 'Jawaban yang sudah kamu ketik akan hilang.', () => navigasi('beranda'))">Batal</button>
                     </div></form>`;
            main.innerHTML = html;
        }

        function validasiKirimUjian() {
            const form = document.getElementById('form-ujian');
            if (!form.checkValidity()) { form.reportValidity(); return; }
            const adaKosong = state.soalAktif.some((q, i) => q.tipe === 'PGK' && form.querySelectorAll(`[name="s_${i}"]:checked`).length === 0);
            adaKosong ? showConfirm('Jawaban Belum Lengkap', 'Ada soal pilihan ganda kompleks yang belum kamu centang. Yakin ingin mengirim sekarang?', eksekusiKirimUjian) : eksekusiKirimUjian();
        }

        async function eksekusiKirimUjian() {
            const form = document.getElementById('form-ujian');
            const btn = document.getElementById('btn-submit-ujian');
            const jawaban = state.soalAktif.map((q, i) => {
                let val;
                if (q.tipe === 'PG' || q.tipe === 'BS') val = form.querySelector(`[name="s_${i}"]:checked`)?.value || '';
                else if (q.tipe === 'PGK') val = Array.from(form.querySelectorAll(`[name="s_${i}"]:checked`)).map(cb => cb.value);
                else val = form.querySelector(`[name="s_${i}"]`).value;
                return { idSoal: q.idSoal, tipe: q.tipe, jawabanSiswa: val };
            });
            const res = await fetchAPI({ action: 'submitSiswa', idPengguna: state.user.id, dataSiswa: { id: state.user.id, nama: state.user.nama, kelas: state.user.keterangan, modul: state.modulAktif, jawaban } }, btn);
            if (res) {
                state.user.progres = state.user.progres ? state.user.progres + ',' + state.modulAktif : state.modulAktif;
                sessionStorage.setItem('sessionUser', JSON.stringify(state.user));
                showToast('Misi berhasil diselesaikan!', 'success');
                renderSidebar();
                navigasi('beranda');
            }
        }

        async function renderHasilSiswa() {
            const main = document.getElementById('main-panel');
            const data = await fetchAPI({ action: 'getRaporSiswa', idPengguna: state.user.id }, null, main);
            if (!data || data.length === 0) { main.innerHTML = '<div class="card"><p>Data rekam jejak belum terhimpun.</p></div>'; return; }
            const s = data[0];
            main.innerHTML = `
                <h2 style="margin-bottom:24px;">Rapor Diagnostik</h2>
                <div class="card" style="max-width: 800px;">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px;">
                        <div>
                            <h3 style="font-size:22px; color:var(--text);">${s.Nama}</h3>
                            <p style="color:var(--text-muted); font-size:15px;">${s.Kelas}</p>
                        </div>
                        <div class="badge badge-success" style="font-size:14px; padding:6px 16px;">Terekam</div>
                    </div>
                    
                    <h4 style="margin-bottom:16px; color:var(--primary); font-size:16px; border-bottom:2px solid var(--border); padding-bottom:8px;">Capaian Akademik</h4>
                    <div class="result-grid">
                        <span class="result-label">Literasi Dasar</span>
                        <span class="result-value">${s.Nilai_Akhir_Literasi !== undefined && s.Nilai_Akhir_Literasi !== '' ? `<strong style="font-size:18px;">${s.Nilai_Akhir_Literasi}</strong> / 100` : '<span class="pending">Proses Penilaian</span>'} ${s.Kategori_Literasi ? `<span class="badge ${s.Kategori_Literasi==='Mahir'?'badge-success':s.Kategori_Literasi==='Cakap'?'badge-info':'badge-warning'}" style="margin-left:8px;">${s.Kategori_Literasi}</span>` : ''}</span>
                        
                        <span class="result-label">Numerasi Dasar</span>
                        <span class="result-value">${s.Nilai_Akhir_Numerasi !== undefined && s.Nilai_Akhir_Numerasi !== '' ? `<strong style="font-size:18px;">${s.Nilai_Akhir_Numerasi}</strong> / 100` : '<span class="pending">Proses Penilaian</span>'} ${s.Kategori_Numerasi ? `<span class="badge ${s.Kategori_Numerasi==='Mahir'?'badge-success':s.Kategori_Numerasi==='Cakap'?'badge-info':'badge-warning'}" style="margin-left:8px;">${s.Kategori_Numerasi}</span>` : ''}</span>
                    </div>
                    
                    <h4 style="margin-top:32px; margin-bottom:16px; color:var(--primary); font-size:16px; border-bottom:2px solid var(--border); padding-bottom:8px;">Profil Nonkognitif</h4>
                    <div class="result-grid">
                        <span class="result-label">Gaya Belajar</span><span class="result-value">${renderValue(s.Gaya_Belajar, 'Belum dipetakan')}</span>
                        <span class="result-label">Minat Utama</span><span class="result-value">${renderValue(s.Minat_Dominan, 'Belum dipetakan')}</span>
                        <span class="result-label">Bakat Dominan</span><span class="result-value">${renderValue(s.Bakat_Dominan, 'Belum dipetakan')}</span>
                        <span class="result-label">Karakter 7 Kebiasaan</span><span class="result-value">${renderValue(s.Karakter_7_Kebiasaan, 'Belum dipetakan')}</span>
                        <span class="result-label">Pembiasaan Keagamaan</span><span class="result-value">${renderValue(s.Pembiasaan_Agama, 'Belum dipetakan')}</span>
                    </div>
                </div>`;
        }

        // ==================== GURU: KOREKSI & HASIL ====================
        async function renderNilaiUjian() {
            const main = document.getElementById('main-panel');
            const data = await fetchAPI({ action: 'getAntreanKoreksi', idPengguna: state.user.id, kelas: state.user.keterangan }, null, main);
            state.antreanGuru = data || [];
            
            let html = '<h2 style="margin-bottom:24px;">Antrean Koreksi Manual</h2><div id="antrean-container" class="card"><div class="table-responsive"><table><thead><tr><th>Nama Siswa</th><th>Kelas</th><th>Modul</th><th>Tindakan</th></tr></thead><tbody>';
            if (!state.antreanGuru.length) html += '<tr><td colspan="4" style="text-align:center; padding:32px; color:var(--text-muted);">Kerja bagus! Tidak ada tumpukan lembar jawaban saat ini.</td></tr>';
            else state.antreanGuru.forEach((item, i) => html += `<tr><td><strong style="color:var(--text);">${item.nama}</strong></td><td>${item.kelas}</td><td><span class="badge badge-neutral">${item.modul}</span></td><td><button onclick="bukaKoreksi(${i})" style="width:auto; margin:0; padding:8px 16px; font-size:13px;">Buka Lembar</button></td></tr>`);
            html += '</tbody></table></div></div><div id="form-koreksi-container" class="hidden card"></div>';
            main.innerHTML = html;
        }

        function bukaKoreksi(index) {
            const item = state.antreanGuru[index];
            state.koreksiAktif = item;
            const container = document.getElementById('form-koreksi-container');
            const jawaban = JSON.parse(item.jsonJawaban);
            
            let html = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; padding-bottom:16px; border-bottom:2px solid var(--border);">
                            <h3 style="font-size:20px;">Lembar Penilaian: <span style="color:var(--primary);">${item.nama}</span></h3>
                            <span class="badge badge-neutral">${item.modul}</span>
                        </div>`;
            
            jawaban.forEach((j, i) => {
                const isPG = j.tipe === 'PG' || j.tipe === 'BS' || j.tipe === 'PGK';
                const jwbTeks = Array.isArray(j.jawabanSiswa) ? j.jawabanSiswa.join(', ') : (j.jawabanSiswa || '<em>Kosong</em>');
                html += `<div class="question-block" style="border-left: 4px solid ${isPG ? 'var(--border)' : 'var(--warning)'};">
                    <p style="font-size:15px;"><strong>${i+1}. ${j.pertanyaan}</strong></p>
                    <div class="koreksi-readonly">
                        <div style="margin-bottom:8px;"><span style="font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase;">Jawaban Siswa</span><br><span style="font-weight:500;">${jwbTeks}</span></div>
                        <div style="border-top:1px dashed #cbd5e1; padding-top:8px;"><span style="font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase;">Kunci (Bobot ${j.bobot})</span><br><span style="color:var(--success); font-weight:500;">${j.kunci}</span></div>
                    </div>`;
                if (!isPG) html += `<div style="margin-top:16px; display:flex; align-items:center; gap:12px;"><label style="font-weight:600; font-size:14px;">Beri Poin:</label><input type="number" class="input-skor" data-bobot="${j.bobot}" min="0" max="${j.bobot}" placeholder="0" style="width:100px; padding:10px;"></div>`;
                else html += `<p style="color:var(--text-muted); font-size:13px; margin-top:12px; display:flex; align-items:center; gap:6px;">${icons.check} Dievaluasi otomatis oleh sistem.</p>`;
                html += `</div>`;
            });
            html += `<div style="display:flex; gap:12px; margin-top:32px;">
                        <button id="btn-simpan-koreksi" onclick="simpanKoreksi()" style="width:auto;">Simpan & Masukkan ke Rapor</button>
                        <button class="secondary" onclick="tutupKoreksi()" style="width:auto;">Kembali</button>
                     </div>`;
            
            container.innerHTML = html;
            container.classList.remove('hidden');
            document.getElementById('antrean-container').classList.add('hidden');
        }

        function tutupKoreksi() { document.getElementById('form-koreksi-container').classList.add('hidden'); document.getElementById('antrean-container').classList.remove('hidden'); }

        async function simpanKoreksi() {
            const inputs = document.querySelectorAll('.input-skor'); let total = 0, valid = true;
            inputs.forEach(inp => {
                const val = Number(inp.value), max = Number(inp.dataset.bobot);
                if (inp.value === "" || isNaN(val) || val < 0 || val > max) { inp.style.borderColor = 'var(--danger)'; valid = false; }
                else { inp.style.borderColor = 'var(--border)'; total += val; }
            });
            if (!valid) { showToast('Angka poin melebihi bobot atau kosong.', 'error'); return; }
            
            const btn = document.getElementById('btn-simpan-koreksi');
            const res = await fetchAPI({ action: 'submitKoreksiGuru', idPengguna: state.user.id, dataKoreksi: [{ barisData: state.koreksiAktif.barisData, totalNilai: total, idSiswa: state.koreksiAktif.idSiswa, modul: state.koreksiAktif.modul }] }, btn);
            if (res) {
                if (!state.allowLihatHasil) { state.allowLihatHasil = true; localStorage.setItem(`allowHasil_${state.user.id}`, 'true'); renderSidebar(); }
                showToast('Penilaian berhasil diproses.', 'success');
                renderNilaiUjian();
            }
        }

        async function renderLihatHasil() {
            const main = document.getElementById('main-panel');
            const data = await fetchAPI({ action: 'getRapor', idPengguna: state.user.id, kelas: state.user.keterangan }, null, main);
            if (!data || data.length === 0) { main.innerHTML = '<div class="card"><p>Sistem belum menghimpun data capaian kelas.</p></div>'; return; }
            
            let html = '<h2 style="margin-bottom:24px;">Buku Rapor Kelas</h2><div class="card table-responsive"><table><thead><tr><th>Identitas Siswa</th><th>Kelas</th><th>Capaian Literasi</th><th>Capaian Numerasi</th><th>Profil Belajar</th><th>Minat/Bakat</th><th>Karakter/Agama</th></tr></thead><tbody>';
            data.forEach(s => {
                const lit = (s.Nilai_Akhir_Literasi !== '' && s.Nilai_Akhir_Literasi !== undefined) ? `<strong style="font-size:15px; color:var(--text);">${s.Nilai_Akhir_Literasi}</strong>` : '<span class="pending">Menunggu</span>';
                const num = (s.Nilai_Akhir_Numerasi !== '' && s.Nilai_Akhir_Numerasi !== undefined) ? `<strong style="font-size:15px; color:var(--text);">${s.Nilai_Akhir_Numerasi}</strong>` : '<span class="pending">Menunggu</span>';
                const kategoriLit = s.Kategori_Literasi ? `<br><span class="badge ${s.Kategori_Literasi==='Mahir'?'badge-success':s.Kategori_Literasi==='Cakap'?'badge-info':'badge-warning'}" style="margin-top:6px;">${s.Kategori_Literasi}</span>` : '';
                const kategoriNum = s.Kategori_Numerasi ? `<br><span class="badge ${s.Kategori_Numerasi==='Mahir'?'badge-success':s.Kategori_Numerasi==='Cakap'?'badge-info':'badge-warning'}" style="margin-top:6px;">${s.Kategori_Numerasi}</span>` : '';
                
                html += `<tr>
                    <td><strong style="color:var(--text);">${s.Nama}</strong></td>
                    <td>${s.Kelas}</td>
                    <td style="vertical-align:top;">${lit} ${kategoriLit}</td>
                    <td style="vertical-align:top;">${num} ${kategoriNum}</td>
                    <td style="font-size:13px; vertical-align:top;">${renderValue(s.Gaya_Belajar, '-')}</td>
                    <td style="font-size:13px; vertical-align:top;"><span style="color:var(--text-muted);">M:</span> ${renderValue(s.Minat_Dominan, '-')}<br><span style="color:var(--text-muted); margin-top:4px; display:inline-block;">B:</span> ${renderValue(s.Bakat_Dominan, '-')}</td>
                    <td style="font-size:13px; vertical-align:top;"><span style="color:var(--text-muted);">7K:</span> ${renderValue(s.Karakter_7_Kebiasaan, '-')}<br><span style="color:var(--text-muted); margin-top:4px; display:inline-block;">Ag:</span> ${renderValue(s.Pembiasaan_Agama, '-')}</td>
                </tr>`;
            });
            html += '</tbody></table></div>';
            main.innerHTML = html;
        }

        function logout() { sessionStorage.removeItem('sessionUser'); window.location.reload(); }
        window.onload = () => { const saved = sessionStorage.getItem('sessionUser'); if (saved) { state.user = JSON.parse(saved); initDashboard(); } };
    </script>
</body>
</html>

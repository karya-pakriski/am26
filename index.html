<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesmen Diagnostik | SDN 1 Godegan Bersinar</title>
    <style>
        :root {
            --primary: #4A7C59; --primary-dark: #3D5A45; --primary-light: #7BA98A;
            --accent: #E8B042; --accent-light: #F5D78C;
            --danger: #C1665B; --danger-light: #E5A9A2;
            --sidebar-bg: #2D2D2D; --sidebar-text: #B0B0B0; --sidebar-hover: #3D3D3D;
            --bg: #F9F7F4; --surface: #FFFFFF;
            --text: #2D2D2D; --text-muted: #6B6B6B;
            --border: #E0DCD5;
            --success: #7BA98A; --warning: #E8B042;
            --radius-md: 10px; --radius-lg: 16px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.5; overflow-x: hidden; }
        .hidden { display: none !important; }

        .badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-success { background: #E3F0E8; color: #3D5A45; }
        .badge-warning { background: #FDF3E0; color: #8B6914; }
        .badge-info { background: #E8F0EB; color: #2D4A3A; }
        .badge-neutral { background: #F0EDE8; color: #5A5A5A; }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { min-width: 300px; padding: 14px 18px; border-radius: 10px; background: var(--surface); box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 12px; transform: translateX(120%); transition: 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-left: 4px solid var(--primary); pointer-events: auto; font-size: 14px; }
        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: var(--danger); }
        .toast.success { border-left-color: var(--success); }
        .toast.warning { border-left-color: var(--accent); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 9999; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.25s; }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-card { background: var(--surface); padding: 28px; border-radius: var(--radius-lg); width: 100%; max-width: 440px; box-shadow: var(--shadow-lg); transform: scale(0.95); transition: 0.25s; }
        .modal-overlay.show .modal-card { transform: scale(1); }
        .modal-card h3 { font-size: 18px; margin-bottom: 10px; color: var(--text); }
        .modal-card p { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

        .btn-spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
        .inline-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--text-muted); }
        .spinner-large { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        input, select, textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; transition: 0.2s; background: var(--surface); color: var(--text); }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(74,124,89,0.1); }
        button { background: var(--primary); color: white; border: none; padding: 11px 18px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; width: 100%; }
        button:hover:not(:disabled) { background: var(--primary-dark); }
        button.secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
        button.secondary:hover:not(:disabled) { background: #F0EDE8; }
        button.danger { background: var(--danger); }
        button.danger:hover:not(:disabled) { background: #A84C43; }
        button.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; width: auto; }
        button:disabled { opacity: 0.65; cursor: not-allowed; }

        .login-layout { display: flex; min-height: 100vh; }
        .login-visual { flex: 1.2; background: linear-gradient(135deg, #3D5A45, #4A7C59); color: white; padding: 60px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
        .login-visual::before { content: ''; position: absolute; top: -10%; right: -10%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%); border-radius: 50%; }
        .school-badge { display: inline-block; padding: 8px 16px; background: rgba(255,255,255,0.12); border-radius: 30px; font-weight: 600; font-size: 13px; margin-bottom: 20px; }
        .login-form-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; background: var(--bg); }
        .login-form-wrapper { width: 100%; max-width: 400px; }
        .login-guide { background: #F0EDE8; border-left: 3px solid var(--primary); padding: 12px; border-radius: 8px; font-size: 13px; color: #4A4A4A; margin-top: 20px; }

        .app-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; border-right: 1px solid #3D3D3D; }
        .sidebar-header { padding: 22px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .sidebar-header .avatar { width: 40px; height: 40px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; color: white; }
        .nav-menu { padding: 14px 12px; flex: 1; overflow-y: auto; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; cursor: pointer; transition: 0.15s; margin-bottom: 3px; font-size: 14px; }
        .nav-item:hover, .nav-item.active { background: var(--sidebar-hover); color: #E8E8E8; }
        .nav-item.active { background: rgba(74,124,89,0.2); color: #A8D5B2; }
        .nav-item.locked { opacity: 0.45; cursor: not-allowed; }
        .nav-item.completed { color: #9AA89E; }
        .nav-item svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
        .main-content { flex: 1; margin-left: 260px; padding: 36px; overflow-y: auto; max-height: 100vh; }

        .card { background: var(--surface); padding: 24px; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); border: 1px solid var(--border); margin-bottom: 20px; }
        .welcome-banner { background: linear-gradient(135deg, #3D5A45, #4A7C59); color: white; padding: 32px; border-radius: var(--radius-lg); margin-bottom: 28px; box-shadow: var(--shadow-md); }
        .welcome-banner h2 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; align-items: start; }
        @media (max-width: 1024px) { .dashboard-grid { grid-template-columns: 1fr; } .sidebar { width: 240px; } .main-content { margin-left: 240px; } }
        .table-responsive { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
        th { background: #F9F7F4; font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; position: sticky; top: 0; z-index: 5; }

        .exam-header-sticky { position: sticky; top: -36px; z-index: 50; background: rgba(255,255,255,0.95); backdrop-filter: blur(6px); border-bottom: 1px solid var(--border); padding: 14px 20px; margin: -36px -36px 20px; display: flex; justify-content: space-between; align-items: center; }
        .question-block { background: var(--surface); padding: 20px; border-radius: var(--radius-md); margin-bottom: 18px; border: 1px solid var(--border); }
        .stimulus-box { background: #F9F7F4; padding: 14px; border-radius: 8px; margin-bottom: 16px; border-left: 3px solid var(--primary); }
        .pertanyaan-teks { font-weight: 600; font-size: 15px; margin-bottom: 14px; color: var(--text); }
        .option-label { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; border: none; border-bottom: 1px solid #EBE7E0; margin-bottom: 0; cursor: pointer; transition: 0.15s; background: transparent; }
        .option-label:last-child { border-bottom: none; }
        .option-label:hover { background: #F9F7F4; }
        .option-label:has(input:checked) { background: #EEF2EF; border-left: 3px solid var(--primary); padding-left: 13px; }
        input[type="radio"], input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); flex-shrink: 0; margin-top: 2px; cursor: pointer; }
        input[type="radio"]:checked + span, input[type="checkbox"]:checked + span { font-weight: 600; color: var(--primary-dark); }
        .option-label span { line-height: 1.5; flex-grow: 1; font-size: 14px; }
        .bs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .bs-grid .option-label { border: 1px solid var(--border); border-radius: 8px; justify-content: center; text-align: center; padding: 18px; }
        .bs-grid .option-label:has(input:checked) { border-color: var(--primary); background: #EEF2EF; border-left: 1px solid var(--primary); padding-left: 18px; }

        .koreksi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
        @media (max-width: 992px) { .koreksi-grid { grid-template-columns: 1fr; } }
        .panel-kiri, .panel-kanan { padding: 18px; border-radius: 10px; border: 1px solid var(--border); }
        .panel-kanan { background: #F9F7F4; border-left: 3px solid var(--primary); }
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 14px; flex-wrap: wrap; }
        .action-bar button { width: auto; }
        .progress-bar { height: 8px; background: #E0DCD5; border-radius: 4px; overflow: hidden; margin-top: 6px; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.4s ease; }
    </style>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <div id="custom-modal" class="modal-overlay">
        <div class="modal-card"><h3 id="modal-title"></h3><p id="modal-message"></p><div class="modal-actions"><button id="modal-btn-cancel" class="secondary" style="width:auto;">Batal</button><button id="modal-btn-confirm" style="width:auto;">Yakin</button></div></div>
    </div>
    <div id="login-screen" class="login-layout">
        <div class="login-visual"><div style="position:relative;z-index:2;max-width:480px;"><div class="school-badge">SDN 1 GODEGAN BERSINAR</div><h1 style="font-size:40px;font-weight:800;margin-bottom:16px;">Asesmen Diagnostik</h1><p style="font-size:16px;opacity:0.9;">Platform pemetaan literasi, numerasi, dan karakter peserta didik.</p></div></div>
        <div class="login-form-area"><div class="login-form-wrapper"><h2 style="font-size:26px;margin-bottom:6px;">Masuk</h2><p style="color:var(--text-muted);margin-bottom:24px;">Gunakan ID dan PIN dari sekolah.</p><form id="login-form" onsubmit="handleLogin(event)"><div style="margin-bottom:16px;"><label style="font-weight:600;display:block;margin-bottom:4px;">ID Pengguna</label><input type="text" id="input-id" required placeholder="S001 / G001 / ADMIN" autofocus></div><div style="margin-bottom:20px;"><label style="font-weight:600;display:block;margin-bottom:4px;">PIN</label><input type="password" id="input-pin" required placeholder="****" maxlength="4"></div><button type="submit" id="btn-login">Masuk Portal</button></form><div class="login-guide"><strong>Panduan:</strong> Gunakan ID dan PIN yang tertera di kartu ujian. Hubungi guru jika lupa.</div></div></div>
    </div>
    <div id="dashboard" class="app-layout hidden">
        <aside class="sidebar"><div class="sidebar-header"><div class="avatar" id="sidebar-avatar">S</div><div><h4 id="sidebar-name" style="color:#f0f0f0;font-size:15px;">Nama</h4><p id="sidebar-role" style="font-size:12px;">Peran</p></div></div><nav class="nav-menu" id="nav-menu"></nav><div style="padding:16px;margin-top:auto;"><button onclick="logout()" class="secondary" style="background:rgba(255,255,255,0.05);color:#ccc;border-color:rgba(255,255,255,0.1);">Keluar</button></div></aside>
        <main class="main-content" id="main-panel"></main>
    </div>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyiOvVCJ0m0Pey2RU-Gh7gbUMzNZE18OV3ETDuT8stVsU7xvNkGTVXHxeJwRrpK0J3n0Q/exec";
        const state = { user: null, config: null, modulAktif: null, soalAktif: [], waktuMulai: null, antreanGuru: [], koreksiAktif: null, timerInterval: null };

        const svg = {
            home: '<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
            book: '<svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>',
            check: '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>',
            lock: '<svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',
            users: '<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
            clipboard: '<svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>',
            chart: '<svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
            settings: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
            print: '<svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 12H4a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>',
            refresh: '<svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>'
        };

        function showToast(msg, type='success') {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<div>${msg}</div>`;
            c.appendChild(t); setTimeout(()=>t.classList.add('show'),10); setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},4000);
        }
        function showConfirm(title, message, onConfirm) {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            const newC = document.getElementById('modal-btn-confirm').cloneNode(true);
            const newB = document.getElementById('modal-btn-cancel').cloneNode(true);
            document.getElementById('modal-btn-confirm').replaceWith(newC);
            document.getElementById('modal-btn-cancel').replaceWith(newB);
            newB.onclick = ()=>modal.classList.remove('show');
            newC.onclick = ()=>{modal.classList.remove('show');onConfirm();};
            modal.classList.add('show');
        }
        async function fetchAPI(payload, btn=null, panel=null) {
            if (state.user && payload.action!=='login') { payload.idPengguna=state.user.id; payload.pin=state.user.pin; }
            let orig=''; if(btn){orig=btn.innerHTML; btn.innerHTML='<span class="btn-spinner"></span>'; btn.disabled=true;}
            else if(panel) panel.innerHTML='<div class="inline-loader"><div class="spinner-large"></div><p>Memuat...</p></div>';
            try {
                const res = await fetch(API_URL, {method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload)});
                const d = await res.json(); if(!d.success) throw new Error(d.error||'Gagal'); return d.data;
            } catch(e) { showToast(e.message,'error'); if(panel) panel.innerHTML=`<div class="card"><p style="color:var(--danger)">${e.message}</p></div>`; return null; }
            finally { if(btn){btn.innerHTML=orig; btn.disabled=false;} }
        }
        async function handleLogin(e) {
            e.preventDefault();
            const id=document.getElementById('input-id').value.trim();
            const pin=document.getElementById('input-pin').value.trim();
            const user=await fetchAPI({action:'login',idPengguna:id,pin:pin},document.getElementById('btn-login'));
            if(user){ user.pin=pin; sessionStorage.setItem('sessionUser',JSON.stringify(user)); state.user=user; state.config=await fetchAPI({action:'getKonfigurasi'}); initDashboard(); }
        }
        function initDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('sidebar-name').innerText=state.user.nama;
            document.getElementById('sidebar-role').innerText=state.user.peran;
            document.getElementById('sidebar-avatar').innerText=state.user.nama.charAt(0).toUpperCase();
            renderSidebar(); navigasi('beranda');
        }
        function renderSidebar() {
            const p=state.user.peran; let h=navItem('beranda',svg.home,'Beranda');
            const prog=(state.user.progres||'').split(',').filter(Boolean);
            if(p==='Siswa') {
                h+=`<div class="nav-item" style="font-weight:600;margin-top:8px;">Asesmen</div>`;
                const latDone=localStorage.getItem(`LATIHAN_${state.user.id}`)==='true';
                h+=navItem('latihan',latDone?svg.check:svg.book,'Latihan',false,!latDone?'Tersedia':'Selesai');
                ['Literasi','Numerasi','Nonkognitif'].forEach((mod,idx)=>{
                    const done=prog.includes(mod); const locked=!done&&prog.length<idx;
                    let icon=svg.book,cls='',click='';
                    if(done){icon=svg.check;cls='completed';} else if(locked){icon=svg.lock;cls='locked';} else {click=`konfirmasiMasukModul('${mod}')`;}
                    h+=`<div class="nav-item ${cls}" onclick="${click}">${icon} ${mod}</div>`;
                });
                h+=navItem('hasil-siswa',prog.length>=3?svg.chart:svg.lock,'Hasil Belajar',prog.length<3);
            } else if(p==='Guru') {
                h+=navItem('koreksi',svg.clipboard,'Koreksi Manual');
                h+=navItem('rapor-kelas',svg.chart,'Rapor Kelas');
                const kelasAmpu=state.user.kelas||'';
                if(kelasAmpu.includes('Kelas 1')||kelasAmpu.includes('Kelas 2')) {
                    h+=`<div class="nav-item" style="font-weight:600;margin-top:8px;">Observasi</div>`;
                    h+=navItem('observasi-Literasi Dasar',svg.book,'Literasi Dasar');
                    h+=navItem('observasi-Numerasi Dasar',svg.book,'Numerasi Dasar');
                }
            } else if(p==='Admin') {
                h+=navItem('manajemen-user',svg.users,'Data Pengguna');
                h+=navItem('bank-soal',svg.book,'Bank Soal');
                h+=navItem('koreksi',svg.clipboard,'Proses Nilai');
                h+=navItem('rapor-sekolah',svg.chart,'Hasil Analisis');
                h+=navItem('manajemen-progres',svg.refresh,'Kendali Progres');
                h+=navItem('konfigurasi',svg.settings,'Konfigurasi');
                h+=navItem('cetak-kartu',svg.print,'Cetak Kartu');
            }
            document.getElementById('nav-menu').innerHTML=h;
        }
        function navItem(id,icon,label,locked=false,extra) {
            return `<div class="nav-item ${locked?'locked':''}" data-panel="${id}" onclick="${locked?'':`navigasi('${id}')`}">${icon} ${label}${extra?` <span style="font-size:10px;color:var(--accent);margin-left:auto;">${extra}</span>`:''}</div>`;
        }
        function navigasi(id) {
            document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
            const t=document.querySelector(`.nav-item[data-panel="${id}"]`);
            if(t&&!t.classList.contains('locked')) t.classList.add('active');
            const main=document.getElementById('main-panel'); main.innerHTML='';
            if(id.startsWith('observasi-')) return renderObservasi(main,id.split('-')[1]);
            if(id.startsWith('ujian-')) return; // handled by konfirmasi
            switch(id) {
                case 'beranda': renderBeranda(main); break;
                case 'latihan': renderLatihan(main); break;
                case 'hasil-siswa': renderHasilSiswa(main); break;
                case 'koreksi': renderAntreanKoreksi(main); break;
                case 'rapor-kelas': renderRapor(main,state.user.kelas); break;
                case 'manajemen-user': renderManajemenUser(main); break;
                case 'bank-soal': renderBankSoal(main); break;
                case 'rapor-sekolah': renderRapor(main,null); break;
                case 'manajemen-progres': renderManajemenProgres(main); break;
                case 'konfigurasi': renderKonfigurasi(main); break;
                case 'cetak-kartu': renderCetakKartu(main); break;
            }
        }
        function konfirmasiMasukModul(modul) {
            if(modul==='Literasi'&&localStorage.getItem(`LATIHAN_${state.user.id}`)!=='true') { showToast('Selesaikan Latihan dulu.','warning'); return; }
            showConfirm(`Mulai ${modul}?`,`Kamu akan mengerjakan Asesmen ${modul}. Waktu akan berjalan setelah dimulai.`,()=>mulaiUjian(modul));
        }
        async function renderBeranda(main) {
            const p=state.user.peran; const prog=(state.user.progres||'').split(',').filter(Boolean); const totalMod=3; const done=prog.length;
            let html=`<div class="welcome-banner"><h2>Selamat Datang, ${state.user.nama}!</h2><p>${p==='Siswa'?'Kelas '+state.user.kelas:p==='Guru'?'Wali Kelas '+state.user.kelas:'Administrator'}</p></div><div class="dashboard-grid">`;
            if(p==='Siswa') {
                html+=`<div class="card"><h3 style="margin-bottom:12px;">Progres Asesmen</h3><div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span>${done} dari ${totalMod} modul selesai</span><span>${Math.round((done/totalMod)*100)}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${Math.round((done/totalMod)*100)}%"></div></div></div><div class="card"><h3 style="margin-bottom:12px;">Profil</h3><p><strong>Nama:</strong> ${state.user.nama}</p><p><strong>Kelas:</strong> ${state.user.kelas}</p><p><strong>Status:</strong> ${done===totalMod?'Semua selesai 🎉':'Belum selesai'}</p></div>`;
            } else {
                const stats=await fetchAPI({action:p==='Admin'?'getStatistik':'getStatistikGuru'});
                html+=`<div class="card"><h3 style="margin-bottom:16px;">Statistik Capaian</h3><div style="height:240px;"><canvas id="chart-stats"></canvas></div></div><div class="card"><h3 style="margin-bottom:12px;">Ringkasan</h3><p>Total Rapor: <strong>${stats?.totalRapor||0}</strong></p>${p==='Admin'?`<p>Siswa Aktif: <strong>${stats?.totalSiswa||0}</strong></p>`:''}<div style="margin-top:12px;display:flex;flex-direction:column;gap:8px;"><button class="secondary" onclick="navigasi('koreksi')" style="justify-content:flex-start;">${svg.clipboard} Koreksi</button><button class="secondary" onclick="navigasi('${p==='Admin'?'rapor-sekolah':'rapor-kelas'}')" style="justify-content:flex-start;">${svg.chart} Rapor</button></div></div>`;
                html+=`</div>`; main.innerHTML=html;
                if(stats?.distribusi) {
                    const ctx=document.getElementById('chart-stats').getContext('2d');
                    new Chart(ctx,{type:'doughnut',data:{labels:['Mahir','Cakap','Dasar','Intervensi'],datasets:[{data:[stats.distribusi['Mahir']||0,stats.distribusi['Cakap']||0,stats.distribusi['Dasar']||0,stats.distribusi['Perlu Intervensi']||0],backgroundColor:['#7BA98A','#E8B042','#D4956A','#C1665B'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right'}},cutout:'70%'}});
                }
            }
            html+=`</div>`; main.innerHTML=html;
        }
        async function renderLatihan(main) {
            let html=`<h2>Latihan Mengisi Soal</h2><p style="color:var(--text-muted);margin-bottom:20px;">Coba semua tipe soal di bawah ini.</p>`;
            html+=`<div class="question-block"><p class="pertanyaan-teks">PG (1 jawaban): Apa warna daun?</p><label class="option-label"><input type="radio" name="lat1" value="Hijau"><span>Hijau</span></label><label class="option-label"><input type="radio" name="lat1" value="Biru"><span>Biru</span></label></div>`;
            html+=`<div class="question-block"><p class="pertanyaan-teks">BS: Apakah 2+2=4?</p><div class="bs-grid"><label class="option-label"><input type="radio" name="lat2" value="Benar"><span>Benar</span></label><label class="option-label"><input type="radio" name="lat2" value="Salah"><span>Salah</span></label></div></div>`;
            html+=`<div class="question-block"><p class="pertanyaan-teks">PGK (centang semua yang benar): Buah-buahan:</p><label class="option-label"><input type="checkbox" name="lat3" value="Apel"><span>Apel</span></label><label class="option-label"><input type="checkbox" name="lat3" value="Kursi"><span>Kursi</span></label><label class="option-label"><input type="checkbox" name="lat3" value="Jeruk"><span>Jeruk</span></label></div>`;
            html+=`<div class="question-block"><p class="pertanyaan-teks">Isian: 5+3=?</p><input type="text" placeholder="Ketik jawaban"></div>`;
            html+=`<div class="question-block"><p class="pertanyaan-teks">Uraian: Kenapa kita harus makan?</p><textarea rows="3" placeholder="Tulis penjelasan"></textarea></div>`;
            html+=`<button onclick="selesaiLatihan()">Selesai Latihan & Mulai Asesmen</button>`;
            main.innerHTML=html;
        }
        function selesaiLatihan() {
            localStorage.setItem(`LATIHAN_${state.user.id}`,'true');
            showToast('Latihan selesai!','success'); renderSidebar(); navigasi('beranda');
        }
        async function mulaiUjian(modul) {
            const main=document.getElementById('main-panel');
            const soal=await fetchAPI({action:'getSoalSiswa',kelas:state.user.kelas,modul:modul},null,main);
            if(!soal||soal.length===0){showToast('Soal belum tersedia.','warning');navigasi('beranda');return;}
            state.modulAktif=modul; state.soalAktif=soal; state.waktuMulai=new Date().toISOString();
            let html=`<div class="exam-header-sticky"><h2>${modul}</h2><div style="display:flex;align-items:center;gap:12px;"><span id="timer-display" style="font-weight:700;color:var(--primary);"></span><span id="status-draf" style="font-size:12px;color:var(--text-muted);">Draf tersimpan</span></div></div><form id="form-ujian">`;
            const draftKey=`DRAFT_${state.user.id}_${modul}`; const draft=JSON.parse(localStorage.getItem(draftKey)||'{}');
            soal.forEach((q,i)=>{
                const val=draft[q.idSoal]||'';
                html+=`<div class="question-block">`;
                if(q.bacaan||q.gambar){html+=`<div class="stimulus-box">${q.bacaan?`<p>${q.bacaan}</p>`:''}${q.gambar?`<img src="${q.gambar}" style="max-width:100%;border-radius:6px;margin-top:8px;">`:''}</div>`;}
                html+=`<div class="pertanyaan-teks">${i+1}. ${q.pertanyaan}</div>`;
                if(q.tipe==='PG') q.opsi.forEach(o=>html+=`<label class="option-label"><input type="radio" name="s_${i}" value="${o}" onchange="simpanDraf()" ${val===o?'checked':''}><span>${o}</span></label>`);
                else if(q.tipe==='BS'){html+=`<div class="bs-grid">`; q.opsi.forEach(o=>html+=`<label class="option-label"><input type="radio" name="s_${i}" value="${o}" onchange="simpanDraf()" ${val===o?'checked':''}><span>${o}</span></label>`); html+=`</div>`;}
                else if(q.tipe==='PGK'){html+=`<p style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">Pilih semua yang benar</p>`; q.opsi.forEach(o=>html+=`<label class="option-label"><input type="checkbox" name="s_${i}" value="${o}" onchange="simpanDraf()" ${(Array.isArray(val)&&val.includes(o))?'checked':''}><span>${o}</span></label>`);}
                else html+=`<textarea name="s_${i}" rows="3" placeholder="Ketik jawaban..." oninput="simpanDrafTunda()" required>${val}</textarea>`;
                html+=`</div>`;
            });
            html+=`<div style="display:flex;gap:12px;"><button type="button" id="btn-submit-ujian" onclick="validasiKirimUjian()">Kirim Jawaban</button><button type="button" class="secondary" onclick="batalUjian()">Batal</button></div></form>`;
            main.innerHTML=html;
            window.addEventListener('beforeunload',peringatanKeluar);
            if(state.config&&state.config['Timer_Aktif']==='Ya'){
                const dur=parseInt(state.config[`Timer_${modul}_Menit`]||60)*60; let sisa=dur;
                const disp=document.getElementById('timer-display'); disp.innerText=`${Math.floor(sisa/60)}:${String(sisa%60).padStart(2,'0')}`;
                state.timerInterval=setInterval(()=>{sisa--; disp.innerText=`${Math.floor(sisa/60)}:${String(sisa%60).padStart(2,'0')}`; if(sisa<=60)disp.style.color='var(--danger)'; if(sisa<=0){clearInterval(state.timerInterval);eksekusiKirimUjian();}},1000);
            }
        }
        function simpanDrafTunda(){clearTimeout(window._draftTimeout);window._draftTimeout=setTimeout(simpanDraf,1000);}
        function simpanDraf(){
            const form=document.getElementById('form-ujian');const draft={};
            state.soalAktif.forEach((q,i)=>{if(q.tipe==='PG'||q.tipe==='BS')draft[q.idSoal]=form.querySelector(`[name="s_${i}"]:checked`)?.value||'';else if(q.tipe==='PGK')draft[q.idSoal]=Array.from(form.querySelectorAll(`[name="s_${i}"]:checked`)).map(cb=>cb.value);else draft[q.idSoal]=form.querySelector(`[name="s_${i}"]`)?.value||'';});
            localStorage.setItem(`DRAFT_${state.user.id}_${state.modulAktif}`,JSON.stringify(draft));
        }
        function validasiKirimUjian(){const form=document.getElementById('form-ujian');if(!form.checkValidity()){form.reportValidity();return;}showConfirm('Kirim Jawaban?','Setelah dikirim, jawaban tidak bisa diubah.',eksekusiKirimUjian);}
        function batalUjian(){showConfirm('Tinggalkan Ujian?','Jawaban yang belum dikirim akan hilang.',()=>{window.removeEventListener('beforeunload',peringatanKeluar);if(state.timerInterval)clearInterval(state.timerInterval);navigasi('beranda');});}
        function peringatanKeluar(e){e.preventDefault();e.returnValue='';}
        async function eksekusiKirimUjian(){
            window.removeEventListener('beforeunload',peringatanKeluar);
            if(state.timerInterval)clearInterval(state.timerInterval);
            const form=document.getElementById('form-ujian');
            const jawaban=state.soalAktif.map((q,i)=>{let v;if(q.tipe==='PG'||q.tipe==='BS')v=form.querySelector(`[name="s_${i}"]:checked`)?.value||'';else if(q.tipe==='PGK')v=Array.from(form.querySelectorAll(`[name="s_${i}"]:checked`)).map(cb=>cb.value);else v=form.querySelector(`[name="s_${i}"]`)?.value||'';return{idSoal:q.idSoal,jawabanSiswa:v};});
            const res=await fetchAPI({action:'submitJawaban',dataPaket:{modul:state.modulAktif,kelas:state.user.kelas,jawaban,waktuMulai:state.waktuMulai,waktuSelesai:new Date().toISOString()}},document.getElementById('btn-submit-ujian'));
            if(res){localStorage.removeItem(`DRAFT_${state.user.id}_${state.modulAktif}`);state.user.progres=state.user.progres?state.user.progres+','+state.modulAktif:state.modulAktif;sessionStorage.setItem('sessionUser',JSON.stringify(state.user));renderSidebar();showToast('Modul selesai!','success');navigasi('beranda');}
        }
        async function renderHasilSiswa(main){
            const data=await fetchAPI({action:'getRaporSiswa'},null,main);if(!data)return;
            main.innerHTML=`<div class="card"><h2>Rapor Diagnostik</h2><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;"><div><h3>Literasi</h3><p style="font-size:24px;font-weight:700;">${data.Skor_Literasi||'-'} <span class="badge badge-info">${data.Kategori_Literasi||''}</span></p><p style="font-size:13px;margin-top:6px;">${data.Deskripsi_Literasi||''}</p></div><div><h3>Numerasi</h3><p style="font-size:24px;font-weight:700;">${data.Skor_Numerasi||'-'} <span class="badge badge-info">${data.Kategori_Numerasi||''}</span></p><p style="font-size:13px;margin-top:6px;">${data.Deskripsi_Numerasi||''}</p></div></div><table style="margin-top:20px;"><tr><td><strong>Gaya Belajar</strong></td><td>${data.Gaya_Belajar_Dominan||'-'}</td></tr><tr><td><strong>Minat</strong></td><td>${data.Minat_Dominan||'-'}</td></tr><tr><td><strong>Bakat</strong></td><td>${data.Bakat_Dominan||'-'}</td></tr><tr><td><strong>7 Kebiasaan</strong></td><td>${data.Karakter_7_Kebiasaan||'-'}</td></tr><tr><td><strong>Agama</strong></td><td>${data.Pembiasaan_Agama||'-'}</td></tr></table><button style="margin-top:16px;width:auto;" onclick="exportPDF()">Unduh PDF</button></div>`;
        }
        function exportPDF(){const data=document.querySelector('table')?.innerText||'';pdfMake.createPdf({content:[{text:'Rapor Asesmen',style:'header'},{text:data,fontSize:10}],styles:{header:{fontSize:18,bold:true}}}).download('rapor.pdf');}
        // Guru: Koreksi, Observasi, Rapor (sama seperti versi sebelumnya)
        // Admin: Manajemen, Bank Soal, Konfigurasi, Cetak Kartu (sama seperti sebelumnya)
        function logout(){sessionStorage.removeItem('sessionUser');window.location.reload();}
        window.onload=()=>{const s=sessionStorage.getItem('sessionUser');if(s){state.user=JSON.parse(s);initDashboard();}};
    </script>
</body>
</html>

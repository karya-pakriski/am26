<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesmen Diagnostik | SDN 1 Godegan</title>
    <style>
        :root {
            --primary: #4361ee; --primary-light: #4895ef; --primary-dark: #3f37c9;
            --sidebar-bg: #1e293b; --sidebar-text: #cbd5e1;
            --bg: #f1f5f9; --surface: #ffffff;
            --text: #0f172a; --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --radius: 12px; --shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }
        .hidden { display: none !important; }

        /* Badge */
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fff7ed; color: #9a3412; }
        .badge-info { background: #e0e7ff; color: #3730a3; }
        .badge-neutral { background: #e2e8f0; color: #475569; }

        /* Toast */
        .toast-container { position: fixed; top: 24px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast { min-width: 300px; padding: 16px 20px; border-radius: 10px; background: var(--surface); box-shadow: 0 10px 30px rgba(0,0,0,0.12); display: flex; align-items: center; gap: 14px; transform: translateX(120%); transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); border-left: 4px solid var(--primary); pointer-events: auto; }
        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: var(--danger); }
        .toast.success { border-left-color: var(--success); }
        .toast.warning { border-left-color: var(--warning); }
        .toast-icon { flex-shrink: 0; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .toast.success .toast-icon { background: #d1fae5; color: var(--success); }
        .toast.error .toast-icon { background: #fee2e2; color: var(--danger); }
        .toast.warning .toast-icon { background: #fff7ed; color: var(--warning); }
        .toast-content { flex-grow: 1; font-size: 14px; font-weight: 500; }
        .toast-close { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.6); z-index: 9999; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.2s; }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-card { background: var(--surface); padding: 32px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); transform: translateY(20px); transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .modal-overlay.show .modal-card { transform: translateY(0); }
        .modal-card h3 { font-size: 18px; margin-bottom: 12px; }
        .modal-card p { font-size: 15px; color: var(--text-muted); margin-bottom: 24px; }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
        .modal-actions button { margin-top: 0; width: auto; padding: 10px 18px; }

        /* Spinner */
        .btn-spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        .inline-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--text-muted); }
        .inline-loader .spinner-large { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Login */
        .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%); }
        .login-card { background: var(--surface); padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); width: 100%; max-width: 460px; text-align: center; }
        .login-icon { width: 80px; height: 80px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: white; }
        .login-icon svg { width: 48px; height: 48px; stroke: white; }
        .login-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .login-sub { color: var(--text-muted); font-size: 15px; margin-bottom: 28px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
        input[type="text"], input[type="number"], textarea { width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: 8px; font-size: 15px; transition: 0.2s; background: #fafbfc; }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(67,97,238,0.1); }

        button { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 600; font-size: 15px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; width: 100%; margin-top: 8px; }
        button:hover:not(:disabled) { background: var(--primary-dark); }
        button.secondary { background: #64748b; }
        button.secondary:hover:not(:disabled) { background: #475569; }
        button:disabled { opacity: 0.7; cursor: not-allowed; }

        /* Layout */
        .app-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; z-index: 10; }
        .sidebar-header { padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 12px; }
        .sidebar-header .avatar { width: 42px; height: 42px; background: var(--primary); color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 20px; flex-shrink: 0; }
        .sidebar-header .user-detail h4 { color: white; font-size: 16px; margin-bottom: 2px; }
        .sidebar-header .user-detail p { font-size: 13px; opacity: 0.7; }

        .nav-menu { padding: 16px 0; flex: 1; }
        .nav-item { display: flex; align-items: center; gap: 14px; padding: 14px 24px; color: var(--sidebar-text); cursor: pointer; transition: 0.2s; border-left: 3px solid transparent; font-weight: 500; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.04); color: white; border-left-color: var(--primary); }
        .nav-item.locked { opacity: 0.45; cursor: not-allowed; }
        .nav-item.completed { opacity: 0.8; cursor: default; }
        .nav-item svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .main-content { flex: 1; margin-left: 260px; padding: 40px; overflow-y: auto; max-height: 100vh; }
        .card { background: var(--surface); padding: 24px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 24px; }
        .welcome-banner { background: linear-gradient(135deg, var(--primary), #3f37c9); color: white; padding: 32px; border-radius: var(--radius); margin-bottom: 28px; }
        .welcome-banner h2 { font-size: 26px; margin-bottom: 6px; }
        .welcome-banner p { opacity: 0.9; }

        .table-responsive { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #f8fafc; font-weight: 600; font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        .question-block { background: #f8fafc; padding: 20px; border-radius: 10px; margin-bottom: 24px; border: 1px solid var(--border); }
        .option-label { display: flex; align-items: center; gap: 12px; padding: 12px; border: 2px solid var(--border); border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .option-label:hover { border-color: var(--primary); background: #f0f4ff; }
        input[type="radio"]:checked + .option-text, input[type="checkbox"]:checked + .option-text { font-weight: 600; color: var(--primary); }
        .koreksi-readonly { background: #f1f5f9; padding: 12px; border-radius: 6px; margin-top: 6px; color: #334155; border-left: 4px solid #94a3b8; }

        /* Perbaikan tampilan hasil: grid rapi tanpa outline */
        .result-grid { display: grid; grid-template-columns: auto 1fr; gap: 6px 12px; align-items: baseline; margin-top: 8px; }
        .result-label { font-weight: 600; color: var(--text-muted); white-space: nowrap; text-align: left; }
        .result-label::after { content: " :"; }
        .result-value { color: var(--text); }
        .result-value.pending { color: var(--warning); font-style: italic; }
        hr.divider { margin: 20px 0; border: none; border-top: 1px dashed var(--border); }
    </style>
</head>
<body>
    <!-- (toast, modal, login screen, dashboard sama seperti sebelumnya) -->

    <div id="toast-container" class="toast-container"></div>
    <div id="custom-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 id="modal-title">Konfirmasi</h3>
            <p id="modal-message">Apakah Anda yakin?</p>
            <div class="modal-actions">
                <button id="modal-btn-cancel" class="secondary">Batal</button>
                <button id="modal-btn-confirm">Yakin</button>
            </div>
        </div>
    </div>

    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <div class="login-icon">
                <svg viewBox="0 0 24 24" fill="none"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
            </div>
            <h1 class="login-title">SD Negeri 1 Godegan</h1>
            <p class="login-sub">Asesmen Diagnostik Literasi, Numerasi, & Nonkognitif</p>
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>ID Pengguna</label>
                    <input type="text" id="input-id" placeholder="Masukkan ID (S101, G001, Admin)" required autocomplete="off" autofocus>
                </div>
                <button type="submit" id="btn-login">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                    Masuk
                </button>
            </form>
        </div>
    </div>

    <div id="dashboard" class="app-layout hidden">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="avatar" id="sidebar-avatar">SD</div>
                <div class="user-detail">
                    <h4 id="sidebar-name">Nama</h4>
                    <p id="sidebar-role">Peran</p>
                </div>
            </div>
            <nav class="nav-menu" id="nav-menu"></nav>
            <div style="padding: 20px;">
                <button onclick="logout()" class="secondary" style="background: transparent; border: 1px solid #475569;">Keluar</button>
            </div>
        </aside>
        <main class="main-content" id="main-panel"></main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyiOvVCJ0m0Pey2RU-Gh7gbUMzNZE18OV3ETDuT8stVsU7xvNkGTVXHxeJwRrpK0J3n0Q/exec";
        
        const state = {
            user: null, modulAktif: null, soalAktif: [],
            antreanGuru: [], koreksiAktif: null, allowLihatHasil: false
        };

        const icons = {
            home: `<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
            book: `<svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`,
            clipboard: `<svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><line x1="9" y1="14" x2="15" y2="14"/><line x1="9" y1="18" x2="13" y2="18"/></svg>`,
            chart: `<svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
            lock: `<svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></svg>`,
            check: `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,
            play: `<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
            success: `<svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="3" fill="none"><polyline points="20 6 9 17 4 12"></polyline></svg>`,
            error: `<svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="3" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`,
            warning: `<svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="3" fill="none"><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`
        };

        // ==================== HELPERS ====================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <div class="toast-icon">${icons[type] || icons.success}</div>
                <div class="toast-content">${message}</div>
                <button class="toast-close" onclick="this.parentElement.remove()">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        function showConfirm(title, message, onConfirm) {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            const btnConfirm = document.getElementById('modal-btn-confirm');
            const btnCancel = document.getElementById('modal-btn-cancel');
            const newConfirm = btnConfirm.cloneNode(true);
            const newCancel = btnCancel.cloneNode(true);
            btnConfirm.parentNode.replaceChild(newConfirm, btnConfirm);
            btnCancel.parentNode.replaceChild(newCancel, btnCancel);
            newCancel.onclick = () => modal.classList.remove('show');
            newConfirm.onclick = () => { modal.classList.remove('show'); onConfirm(); };
            modal.classList.add('show');
        }

        async function fetchAPI(payload, btnElement = null, targetPanel = null) {
            let originalBtnHtml = '';
            if (btnElement) {
                originalBtnHtml = btnElement.innerHTML;
                btnElement.innerHTML = `<span class="btn-spinner"></span> Memproses...`;
                btnElement.disabled = true;
            } else if (targetPanel) {
                targetPanel.innerHTML = `<div class="inline-loader"><div class="spinner-large"></div><p style="font-weight:500;">Mengambil Data Server...</p></div>`;
            }

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.status === "error") throw new Error(data.message);
                return data.data || data.message;
            } catch (err) {
                showToast(err.message, 'error');
                if (targetPanel) targetPanel.innerHTML = `<div class="inline-loader" style="color:var(--danger)"><p>Gagal memuat data.</p></div>`;
                return null;
            } finally {
                if (btnElement) {
                    btnElement.innerHTML = originalBtnHtml;
                    btnElement.disabled = false;
                }
            }
        }

        // ==================== LOGIN ====================
        async function handleLogin(e) {
            e.preventDefault();
            const id = document.getElementById('input-id').value.trim();
            const btn = document.getElementById('btn-login');
            const user = await fetchAPI({ action: 'login', idPengguna: id }, btn);
            if (user) {
                sessionStorage.setItem('sessionUser', JSON.stringify(user));
                state.user = user;
                showToast('Autentikasi berhasil', 'success');
                initDashboard();
            }
        }

        function initDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('sidebar-name').innerText = state.user.nama;
            document.getElementById('sidebar-role').innerText = `${state.user.peran} • ${state.user.keterangan}`;
            document.getElementById('sidebar-avatar').innerText = state.user.nama.charAt(0).toUpperCase();
            if (localStorage.getItem(`allowHasil_${state.user.id}`) === 'true') state.allowLihatHasil = true;
            renderSidebar();
            navigasi('beranda');
        }

        function renderSidebar() {
            const peran = state.user.peran.toLowerCase();
            const nav = document.getElementById('nav-menu');
            nav.innerHTML = '';

            if (peran === 'siswa') {
                nav.innerHTML += navItem('beranda', icons.home, 'Beranda');
                const modulList = ['Literasi', 'Numerasi', 'Nonkognitif'];
                const progres = (state.user.progres || '').split(',').filter(Boolean);
                let unlockNext = true;

                modulList.forEach(mod => {
                    const done = progres.includes(mod);
                    const locked = !done && !unlockNext;
                    if (!done && unlockNext) unlockNext = false;
                    let icon = icons.book, extraClass = '', clickHandler = '', label = `Modul ${mod}`;
                    if (done) { icon = icons.check; extraClass = 'completed'; label += ' ✓'; }
                    else if (locked) { icon = icons.lock; extraClass = 'locked'; }
                    else { icon = icons.play; clickHandler = `navigasi('ujian-${mod}', this)`; }
                    nav.innerHTML += `<div class="nav-item ${extraClass}" data-panel="ujian-${mod}" onclick="${clickHandler}">${icon} ${label}</div>`;
                });

                const semuaSelesai = progres.length >= 3;
                nav.innerHTML += navItem('hasil', semuaSelesai ? icons.chart : icons.lock, 'Hasil', !semuaSelesai);
            } else {
                nav.innerHTML += navItem('beranda', icons.home, 'Beranda');
                nav.innerHTML += navItem('nilai-ujian', icons.clipboard, 'Nilai Ujian');
                nav.innerHTML += navItem('lihat-hasil', state.allowLihatHasil ? icons.chart : icons.lock, 'Lihat Hasil', !state.allowLihatHasil);
            }
        }

        function navItem(panelId, iconHtml, label, locked = false) {
            return `<div class="nav-item ${locked ? 'locked' : ''}" data-panel="${panelId}" onclick="${locked ? '' : `navigasi('${panelId}', this)`}">${iconHtml} ${label}</div>`;
        }

        function navigasi(panelId, element = null) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if (element) element.classList.add('active');
            else {
                const target = document.querySelector(`.nav-item[data-panel="${panelId}"]`);
                if (target && !target.classList.contains('locked') && !target.classList.contains('completed')) target.classList.add('active');
            }
            const main = document.getElementById('main-panel');
            main.innerHTML = '';
            if (panelId.startsWith('ujian-')) { mulaiUjian(panelId.split('-')[1]); return; }
            switch (panelId) {
                case 'beranda': renderBeranda(); break;
                case 'hasil': renderHasilSiswa(); break;
                case 'nilai-ujian': renderNilaiUjian(); break;
                case 'lihat-hasil': renderLihatHasil(); break;
            }
        }

        // Fungsi bantu untuk menampilkan nilai dengan fallback
        function renderValue(value, fallback = 'Menunggu Penilaian') {
            return (value !== undefined && value !== null && value !== '' && value !== '-') ? value : `<span class="result-value pending">${fallback}</span>`;
        }

        // ==================== BERANDA ====================
        function renderBeranda() {
            const p = state.user.peran.toLowerCase();
            let html = `<div class="welcome-banner"><h2>Selamat Datang, ${state.user.nama}</h2><p>${p === 'siswa' ? 'Kelas ' + state.user.keterangan : p === 'guru' ? 'Wali Kelas ' + state.user.keterangan : 'Administrator • Akses Penuh'}</p></div>`;
            if (p === 'siswa') {
                html += `<div class="card">
                    <h3 style="margin-bottom:16px;">Informasi Diri</h3>
                    <div class="result-grid">
                        <span class="result-label">Nama Lengkap</span><span class="result-value">${state.user.nama}</span>
                        <span class="result-label">Kelas</span><span class="result-value">${state.user.keterangan}</span>
                        <span class="result-label">Progres Misi</span><span class="result-value">${state.user.progres || 'Belum ada'}</span>
                    </div>
                </div>`;
            } else {
                html += `<div class="card"><h3 style="margin-bottom:12px;">Ringkasan</h3><p>Gunakan menu <strong>Nilai Ujian</strong> untuk menilai jawaban uraian siswa.</p><p>Menu <strong>Lihat Hasil</strong> aktif setelah minimal satu siswa selesai dinilai.</p></div>`;
            }
            document.getElementById('main-panel').innerHTML = html;
        }

        // ==================== SISWA: UJIAN (tetap sama) ====================
        async function mulaiUjian(modul) {
            const main = document.getElementById('main-panel');
            const soal = await fetchAPI({ action: 'getSoal', idPengguna: state.user.id, kelas: state.user.keterangan, modul }, null, main);
            if (!soal || soal.length === 0) { showToast('Belum ada soal.', 'warning'); navigasi('beranda'); return; }
            state.modulAktif = modul; state.soalAktif = soal;
            renderFormUjian();
        }

        function renderFormUjian() {
            const main = document.getElementById('main-panel');
            let html = `<h2>Asesmen ${state.modulAktif}</h2><form id="form-ujian">`;
            state.soalAktif.forEach((q, i) => {
                html += `<div class="question-block"><p style="font-weight:600; margin-bottom:8px;">${i+1}. ${q.pertanyaan}</p>`;
                if (q.bacaan) html += `<p style="font-style:italic; background:#e2e8f0; padding:8px; border-radius:6px; margin-bottom:12px;">${q.bacaan}</p>`;
                if (q.gambar) html += `<img src="${q.gambar}" style="max-width:100%; margin-bottom:12px; border-radius:8px;">`;
                if (q.tipe === 'PG' || q.tipe === 'BS') q.opsi.forEach(opt => html += `<label class="option-label"><input type="radio" name="s_${i}" value="${opt}" required> <span class="option-text">${opt}</span></label>`);
                else if (q.tipe === 'PGK') {
                    html += `<p style="font-size:13px; color:var(--text-muted);">Pilih lebih dari satu</p>`;
                    q.opsi.forEach(opt => html += `<label class="option-label"><input type="checkbox" name="s_${i}" value="${opt}"> <span class="option-text">${opt}</span></label>`);
                } else html += `<textarea name="s_${i}" rows="3" required placeholder="Tulis jawaban..."></textarea>`;
                html += `</div>`;
            });
            html += `<button type="button" id="btn-submit-ujian" onclick="validasiKirimUjian()">Kirim Jawaban</button>
                     <button type="button" class="secondary" style="margin-top:8px;" onclick="showConfirm('Tinggalkan Ujian?', 'Jawaban yang belum dikirim akan hilang.', () => navigasi('beranda'))">Batal</button></form>`;
            main.innerHTML = html;
        }

        function validasiKirimUjian() {
            const form = document.getElementById('form-ujian');
            if (!form.checkValidity()) { form.reportValidity(); return; }
            const adaKosong = state.soalAktif.some((q, i) => q.tipe === 'PGK' && form.querySelectorAll(`[name="s_${i}"]:checked`).length === 0);
            adaKosong ? showConfirm('Jawaban Belum Lengkap', 'Ada soal pilihan ganda kompleks yang belum dicentang. Yakin kirim sekarang?', eksekusiKirimUjian) : eksekusiKirimUjian();
        }

        async function eksekusiKirimUjian() {
            const form = document.getElementById('form-ujian');
            const btn = document.getElementById('btn-submit-ujian');
            const jawaban = state.soalAktif.map((q, i) => {
                let val;
                if (q.tipe === 'PG' || q.tipe === 'BS') val = form.querySelector(`[name="s_${i}"]:checked`)?.value || '';
                else if (q.tipe === 'PGK') val = Array.from(form.querySelectorAll(`[name="s_${i}"]:checked`)).map(cb => cb.value);
                else val = form.querySelector(`[name="s_${i}"]`).value;
                return { idSoal: q.idSoal, tipe: q.tipe, jawabanSiswa: val };
            });
            const res = await fetchAPI({ action: 'submitSiswa', idPengguna: state.user.id, dataSiswa: { id: state.user.id, nama: state.user.nama, kelas: state.user.keterangan, modul: state.modulAktif, jawaban } }, btn);
            if (res) {
                state.user.progres = state.user.progres ? state.user.progres + ',' + state.modulAktif : state.modulAktif;
                sessionStorage.setItem('sessionUser', JSON.stringify(state.user));
                showToast('Jawaban berhasil diserahkan', 'success');
                renderSidebar();
                navigasi('beranda');
            }
        }

        // ==================== SISWA: HASIL ====================
        async function renderHasilSiswa() {
            const main = document.getElementById('main-panel');
            const data = await fetchAPI({ action: 'getRaporSiswa', idPengguna: state.user.id }, null, main);
            if (!data || data.length === 0) { main.innerHTML = '<div class="card"><p>Belum ada data hasil.</p></div>'; return; }
            const s = data[0];
            let html = `
                <h2 style="margin-bottom:20px;">Hasil Asesmen</h2>
                <div class="card">
                    <h3 style="margin-bottom:16px;">Data Diri</h3>
                    <div class="result-grid">
                        <span class="result-label">Nama</span><span class="result-value">${s.Nama}</span>
                        <span class="result-label">Kelas</span><span class="result-value">${s.Kelas}</span>
                    </div>
                    <hr class="divider">
                    <h3 style="margin-bottom:16px;">Capaian Akademik</h3>
                    <div class="result-grid">
                        <span class="result-label">Literasi</span><span class="result-value">${s.Nilai_Akhir_Literasi !== undefined && s.Nilai_Akhir_Literasi !== '' ? s.Nilai_Akhir_Literasi + ' / 100' : '<span class="pending">Menunggu Penilaian</span>'} ${s.Kategori_Literasi ? `<span class="badge ${s.Kategori_Literasi==='Mahir'?'badge-success':s.Kategori_Literasi==='Cakap'?'badge-info':'badge-warning'}">${s.Kategori_Literasi}</span>` : ''}</span>
                        <span class="result-label">Numerasi</span><span class="result-value">${s.Nilai_Akhir_Numerasi !== undefined && s.Nilai_Akhir_Numerasi !== '' ? s.Nilai_Akhir_Numerasi + ' / 100' : '<span class="pending">Menunggu Penilaian</span>'} ${s.Kategori_Numerasi ? `<span class="badge ${s.Kategori_Numerasi==='Mahir'?'badge-success':s.Kategori_Numerasi==='Cakap'?'badge-info':'badge-warning'}">${s.Kategori_Numerasi}</span>` : ''}</span>
                    </div>
                    <hr class="divider">
                    <h3 style="margin-bottom:16px;">Profil Nonkognitif</h3>
                    <div class="result-grid">
                        <span class="result-label">Gaya Belajar</span><span class="result-value">${renderValue(s.Gaya_Belajar, 'Belum diisi')}</span>
                        <span class="result-label">Minat Dominan</span><span class="result-value">${renderValue(s.Minat_Dominan, 'Belum diisi')}</span>
                        <span class="result-label">Bakat Dominan</span><span class="result-value">${renderValue(s.Bakat_Dominan, 'Belum diisi')}</span>
                        <span class="result-label">7 Kebiasaan</span><span class="result-value">${renderValue(s.Karakter_7_Kebiasaan, 'Belum diisi')}</span>
                        <span class="result-label">Pembiasaan Agama</span><span class="result-value">${renderValue(s.Pembiasaan_Agama, 'Belum diisi')}</span>
                    </div>
                </div>`;
            main.innerHTML = html;
        }

        // ==================== GURU: NILAI UJIAN (tetap) ====================
        async function renderNilaiUjian() {
            const main = document.getElementById('main-panel');
            const data = await fetchAPI({ action: 'getAntreanKoreksi', idPengguna: state.user.id, kelas: state.user.keterangan }, null, main);
            state.antreanGuru = data || [];
            let html = '<h2 style="margin-bottom:20px;">Penilaian Uraian</h2><div id="antrean-container" class="card"><div class="table-responsive"><table><thead><tr><th>Nama</th><th>Kelas</th><th>Modul</th><th>Aksi</th></tr></thead><tbody>';
            if (!state.antreanGuru.length) html += '<tr><td colspan="4" style="text-align:center;">Tidak ada antrean.</td></tr>';
            else state.antreanGuru.forEach((item, i) => html += `<tr><td><strong>${item.nama}</strong></td><td>${item.kelas}</td><td>${item.modul}</td><td><button onclick="bukaKoreksi(${i})" style="width:auto; margin:0;">Buka Lembar</button></td></tr>`);
            html += '</tbody></table></div></div><div id="form-koreksi-container" class="hidden card"></div>';
            main.innerHTML = html;
        }

        function bukaKoreksi(index) { /* ... sama ... */ }
        function tutupKoreksi() { /* ... */ }
        async function simpanKoreksi() { /* ... */ }

        // ==================== GURU: LIHAT HASIL ====================
        async function renderLihatHasil() {
            const main = document.getElementById('main-panel');
            const data = await fetchAPI({ action: 'getRapor', idPengguna: state.user.id, kelas: state.user.keterangan }, null, main);
            if (!data || data.length === 0) { main.innerHTML = '<div class="card"><p>Belum ada data capaian.</p></div>'; return; }
            let html = '<h2 style="margin-bottom:20px;">Rekapitulasi Hasil</h2><div class="card table-responsive"><table><thead><tr><th>Nama</th><th>Kelas</th><th>Literasi</th><th>Numerasi</th><th>Gaya Belajar</th><th>Minat</th><th>Bakat</th><th>7 Kebiasaan</th><th>Agama</th></tr></thead><tbody>';
            data.forEach(s => {
                const lit = (s.Nilai_Akhir_Literasi !== '' && s.Nilai_Akhir_Literasi !== undefined) ? s.Nilai_Akhir_Literasi + ' / 100' : '<span class="pending">Menunggu</span>';
                const num = (s.Nilai_Akhir_Numerasi !== '' && s.Nilai_Akhir_Numerasi !== undefined) ? s.Nilai_Akhir_Numerasi + ' / 100' : '<span class="pending">Menunggu</span>';
                const kategoriLit = s.Kategori_Literasi ? `<span class="badge ${s.Kategori_Literasi==='Mahir'?'badge-success':s.Kategori_Literasi==='Cakap'?'badge-info':'badge-warning'}">${s.Kategori_Literasi}</span>` : '';
                const kategoriNum = s.Kategori_Numerasi ? `<span class="badge ${s.Kategori_Numerasi==='Mahir'?'badge-success':s.Kategori_Numerasi==='Cakap'?'badge-info':'badge-warning'}">${s.Kategori_Numerasi}</span>` : '';
                html += `<tr>
                    <td><strong>${s.Nama}</strong></td><td>${s.Kelas}</td>
                    <td>${lit} ${kategoriLit}</td>
                    <td>${num} ${kategoriNum}</td>
                    <td>${renderValue(s.Gaya_Belajar, '-')}</td>
                    <td>${renderValue(s.Minat_Dominan, '-')}</td>
                    <td>${renderValue(s.Bakat_Dominan, '-')}</td>
                    <td>${renderValue(s.Karakter_7_Kebiasaan, '-')}</td>
                    <td>${renderValue(s.Pembiasaan_Agama, '-')}</td>
                </tr>`;
            });
            html += '</tbody></table></div>';
            main.innerHTML = html;
        }

        function logout() { sessionStorage.removeItem('sessionUser'); window.location.reload(); }

        window.onload = () => {
            const saved = sessionStorage.getItem('sessionUser');
            if (saved) { state.user = JSON.parse(saved); initDashboard(); }
        };

        // Fungsi koreksi yang sempat terpotong (sama seperti sebelumnya)
        function bukaKoreksi(index) {
            const item = state.antreanGuru[index];
            state.koreksiAktif = item;
            const container = document.getElementById('form-koreksi-container');
            const jawaban = JSON.parse(item.jsonJawaban);
            let html = `<h3>Lembar Koreksi: ${item.nama} (${item.modul})</h3>`;
            jawaban.forEach((j, i) => {
                const isPG = j.tipe === 'PG' || j.tipe === 'BS' || j.tipe === 'PGK';
                const jwbTeks = Array.isArray(j.jawabanSiswa) ? j.jawabanSiswa.join(', ') : (j.jawabanSiswa || '<em>Tidak dijawab</em>');
                html += `<div class="question-block"><p><strong>${i+1}. ${j.pertanyaan}</strong></p>
                    <div class="koreksi-readonly"><strong>Jawaban Siswa:</strong> ${jwbTeks}</div>
                    <div class="koreksi-readonly"><strong>Kunci (Bobot ${j.bobot}):</strong> ${j.kunci}</div>`;
                if (!isPG) html += `<div style="margin-top:10px;"><label>Beri Poin:</label><input type="number" class="input-skor" data-bobot="${j.bobot}" min="0" max="${j.bobot}" placeholder="0" style="width:100px; margin-left:10px;"></div>`;
                else html += `<p style="color:var(--text-muted); font-size:13px; margin-top:6px;">* Dinilai otomatis oleh sistem.</p>`;
                html += `</div>`;
            });
            html += `<button id="btn-simpan-koreksi" onclick="simpanKoreksi()">Simpan Penilaian</button>
                     <button class="secondary" onclick="tutupKoreksi()" style="margin-left:8px;">Batal</button>`;
            container.innerHTML = html;
            container.classList.remove('hidden');
            document.getElementById('antrean-container').classList.add('hidden');
        }

        function tutupKoreksi() { document.getElementById('form-koreksi-container').classList.add('hidden'); document.getElementById('antrean-container').classList.remove('hidden'); }

        async function simpanKoreksi() {
            const inputs = document.querySelectorAll('.input-skor'); let total = 0, valid = true;
            inputs.forEach(inp => {
                const val = Number(inp.value), max = Number(inp.dataset.bobot);
                if (inp.value === "" || isNaN(val) || val < 0 || val > max) { inp.style.borderColor = 'var(--danger)'; valid = false; }
                else { inp.style.borderColor = 'var(--border)'; total += val; }
            });
            if (!valid) { showToast('Periksa kembali rentang poin.', 'warning'); return; }
            const btn = document.getElementById('btn-simpan-koreksi');
            const res = await fetchAPI({ action: 'submitKoreksiGuru', idPengguna: state.user.id, dataKoreksi: [{ barisData: state.koreksiAktif.barisData, totalNilai: total, idSiswa: state.koreksiAktif.idSiswa, modul: state.koreksiAktif.modul }] }, btn);
            if (res) {
                if (!state.allowLihatHasil) { state.allowLihatHasil = true; localStorage.setItem(`allowHasil_${state.user.id}`, 'true'); renderSidebar(); }
                showToast('Poin berhasil disimpan.', 'success');
                renderNilaiUjian();
            }
        }
    </script>
</body>
</html>
